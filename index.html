<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SLSNZ Pod Builder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>SLSNZ Club Support Pod Builder</h1>
      <p>Drag clubs between pods. Map colours and pod summaries update automatically.</p>
    </div>
    <div class="actions">
      <button id="toggleMapBtn">Hide Map</button>
      <button id="addPodBtn">Add Pod</button>
      <button id="resetBtn">Reset</button>
      <button id="exportBtn">Save File</button>
      <label class="importBtn">Import File<input id="importInput" type="file" accept="application/json" hidden></label>
    </div>
  </header>

  <main>
    <section class="mapPanel panel" id="mapPanel">
      <div class="panelHeader">
        <h2>Club Map</h2>
        <button class="expandBtn" data-panel="mapPanel">Full Screen</button>
      </div>
      <div class="mapBody">
        <div id="map"></div>
        <aside id="clubDetails" class="clubDetails"></aside>
      </div>
    </section>

    <section class="summaryPanel panel" id="summaryPanel">
      <div class="panelHeader">
        <h2>Pod Summary</h2>
        <button class="expandBtn" data-panel="summaryPanel">Full Screen</button>
      </div>
      <div id="summary"></div>
    </section>

    <section class="boardPanel panel" id="boardPanel">
      <div class="boardHeader panelHeader">
        <h2>Pod Planner</h2>
        <div class="boardControls">
          <input id="searchInput" placeholder="Search clubs..." />
          <select id="sortSelect" title="Sort clubs">
            <option value="name">Sort: Club name</option>
            <option value="primaryMembersDesc">Sort: Primary members ↓</option>
            <option value="volunteerPatrolHoursDesc">Sort: Volunteer hrs ↓</option>
            <option value="plsPatrolHoursDesc">Sort: PLS hrs ↓</option>
            <option value="clubSize">Sort: Club size</option>
          </select>
          <button id="toggleFiltersBtn">Filters</button>
          <button class="expandBtn" data-panel="boardPanel">Full Screen</button>
        </div>
      </div>
      <div id="filterBar" class="filterBar" hidden></div>
      <div id="board" class="board"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
