<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Club Support Model Pod Designer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div>
      <h1>Club Support Model Pod Designer</h1>
      <p>Design and compare club support pod allocations. Map colours and pod summaries update automatically.</p>
    </div>
    <div class="actions">
      <button id="toggleMapBtn">Hide Map</button>
      <button id="resetBtn">Reset</button>
      <div class="menuWrap">
        <button id="exportMenuBtn">Export ▾</button>
        <div id="exportMenu" class="menuPanel" hidden>
          <button id="exportScenarioBtn">Export current scenario</button>
          <button id="exportWorkspaceBtn">Export all scenarios & settings</button>
        </div>
      </div>
      <button id="pdfBtn">Export PDF</button>
      <label class="importBtn">Import File<input id="importInput" type="file" accept="application/json" hidden></label>
    </div>
  </header>

  <section id="scenarioPanel" class="scenarioPanel"></section>

  <main id="appMain">
    <section class="mapPanel panel" id="mapPanel">
      <div class="panelHeader">
        <h2>Club Map</h2>
        <div class="panelHeaderActions"><button id="toggleMapBtnLocal" class="secondaryBtn">Hide Map</button><button class="expandBtn" data-panel="mapPanel">Full Screen</button></div>
      </div>
      <div class="mapBody">
        <div id="map"></div>
        <aside id="clubDetails" class="clubDetails"></aside>
      </div>
    </section>

    <div id="verticalSplitter" class="splitter verticalSplitter" title="Drag to resize map and summary"></div>
    <section class="summaryPanel panel" id="summaryPanel">
      <div class="panelHeader">
        <h2>Pod Summary</h2>
        <button class="expandBtn" data-panel="summaryPanel">Full Screen</button>
      </div>
      <div id="summary"></div>
    </section>

    <div id="horizontalSplitter" class="splitter horizontalSplitter" title="Drag to resize top and bottom sections"></div>
    <section class="boardPanel panel" id="boardPanel">
      <div class="boardHeader panelHeader">
        <div class="podPlannerTitle"><h2>Pod Planner</h2><button id="addPodBtn" class="secondaryBtn">Add Pod</button></div>
        <div class="boardControls">
          <input id="searchInput" placeholder="Search clubs..." />
          <select id="sortSelect" title="Sort clubs">
            <option value="name">Sort: Club name</option>
            <option value="primaryMembersDesc">Sort: Primary members ↓</option>
            <option value="volunteerPatrolHoursDesc">Sort: Volunteer hrs ↓</option>
            <option value="plsPatrolHoursDesc">Sort: PLS hrs ↓</option>
            <option value="clubSize">Sort: Club size</option>
          </select>
          <button class="expandBtn" data-panel="boardPanel">Full Screen</button>
        </div>
      </div>
      <div id="filterBar" class="filterBar"></div>
      <div id="board" class="board"></div>
    </section>
  </main>

  <section id="reportView" aria-hidden="true"></section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
